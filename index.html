<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ujian PAI Kelas 8</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:0;
padding:15px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
text-align:center;
}

input[type=text],
textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
box-sizing:border-box;
}

.soal{
margin-bottom:25px;
padding:10px;
border-bottom:1px solid #ddd;
}

button{
width:100%;
padding:15px;
font-size:18px;
background:#198754;
color:white;
border:none;
border-radius:8px;
}

#hasil{
margin-top:20px;
padding:15px;
background:#eef;
border-radius:8px;
display:none;
}

.benar{
color:green;
font-weight:bold;
}

.salah{
color:red;
font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h1>UJIAN PAI KELAS 8</h1>

<label>Nama Siswa</label> <input type="text" id="nama">

<label>Kelas</label> <input type="text" id="kelas">

<div id="soalArea">

<!-- SOAL PG NANTI MASUK DI SINI -->

<div class="soal">

<div class="soal">
<p><b>19.</b> Nabi pertama yang wajib diketahui umat Islam adalah ....</p>
<label><input type="radio" name="q19" value="A"> Nuh a.s.</label><br>
<label><input type="radio" name="q19" value="B"> Adam a.s.</label><br>
<label><input type="radio" name="q19" value="C"> Idris a.s.</label><br>
<label><input type="radio" name="q19" value="D"> Ibrahim a.s.</label>
</div>

</div>

<!-- ISIAN -->

<div class="soal">
<p><b>1.</b> Istilah umat yang adil dan moderat dalam Q.S. Al-Baqarah ayat 143 adalah ....</p>

<input type="text" id="isian1">
</div>



<div class="soal">


  
<!-- URAIAN -->

<div class="soal">
<p><b>1.</b> Jelaskan pengertian ummatan wasatan menurut pemahamanmu!</p>

<textarea id="uraian1" rows="5"></textarea>
</div>

  
</div>

<button onclick="periksa()">SELESAI UJIAN</button>

<div id="hasil"></div>


</div>

<script>

const kunciPG = {
q1:"B",
};

const pembahasanPG = {
q1:"Ummatan wasatan",
};  
  
const kunciIsian = {
isian1:"ummatan wasatan",
};

function normal(teks){
return teks
.toLowerCase()
.trim()
.replace(/-/g," ")
.replace(/\s+/g," ");
}

function periksa(){
alert("TES1");
let benarPG = 0;
let salahList = "";
alert("TEST2");

for(let kode in kunciPG){

let dipilih =
document.querySelector(
'input[name="'+kode+'"]:checked'
);

if(dipilih){

if(dipilih.value===kunciPG[kode]){

benarPG++;

}else{

salahList +=
"<p class='salah'>"+
kode+
" salah.<br>"+
"Jawaban benar: "+
pembahasanPG[kode]+
"</p>";

}

}else{

salahList +=
"<p class='salah'>"+
kode+
" belum dijawab.<br>"+
"Jawaban benar: "+
pembahasanPG[kode]+
"</p>";

}
alert("TEST3");
} // PENUTUP for kunciPG

let benarIsian = 0;

for(let kode in kunciIsian){

let isi =
normal(
document.getElementById(kode).value
);

let kunci =
normal(kunciIsian[kode]);

if(isi===""){

salahList +=
"<p class='salah'>"+
kode+
" belum dijawab.<br>Jawaban benar: "+
kunciIsian[kode]+
"</p>";

}
else if(isi===kunci){

benarIsian++;

}
else{

salahList +=
"<p class='salah'>"+
kode+
" salah.<br>Jawaban benar: "+
kunciIsian[kode]+
"</p>";

  }

}
alert("TEST4");
const totalPG = Object.keys(kunciPG).length;
const totalIsian = Object.keys(kunciIsian).length;

let nilaiPG =
(benarPG / totalPG) * 50;

let nilaiIsian =
(benarIsian / totalIsian) * 50;

let nilaiAkhir =
Math.round(nilaiPG + nilaiIsian);

document.getElementById("hasil").style.display="block";

document.getElementById("hasil").innerHTML=
"<h2>Hasil Ujian</h2>"+
"<p>Nama : "+document.getElementById("nama").value+"</p>"+
"<p>Kelas : "+document.getElementById("kelas").value+"</p>"+
"<p>Nilai PG : "+nilaiPG+"</p>"+
"<p>Nilai Isian : "+nilaiIsian+"</p>"+
"<p><b>Benar PG :</b> "+benarPG+" / "+totalPG+"</p>"+
"<p><b>Benar Isian :</b> "+benarIsian+" / "+totalIsian+"</p>"+
"<p><b>Nilai Akhir :</b> "+nilaiAkhir+"</p>"+
nilaiAkhir+
"</p>"+
"<hr>"+
"<h3>Jawaban Salah</h3>"+
salahList+
"<hr>"+

"<h3>Uraian (Periksa Manual)</h3>"+

"<p><b>51.</b> "+document.getElementById("uraian1").value+"</p>"+

"<p><b>52.</b> "+document.getElementById("uraian2").value+"</p>"+

"<p><b>53.</b> "+document.getElementById("uraian3").value+"</p>"+

"<p><b>54.</b> "+document.getElementById("uraian4").value+"</p>"+

"<p><b>55.</b> "+document.getElementById("uraian5").value+"</p>"+

"<br><br>"+

"<button onclick='salinHasil()'>📋 SALIN HASIL</button>";
}
function salinHasil(){

let teks =
document.getElementById("hasil").innerText;
alert("TEST5");
navigator.clipboard.writeText(teks);

alert("Hasil berhasil disalin");

}
</script>

</body>
</html>
